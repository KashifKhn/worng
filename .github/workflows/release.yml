name: Release

on:
  push:
    tags:
      - "v*"

# Only one release can run at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Run the full test suite before releasing — never ship a broken binary
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Test
        run: go test ./... -race

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: "386"
          # macOS
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: "386"
          # FreeBSD
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GOARM_SUFFIX=""
          if [ -n "${{ matrix.goarm }}" ]; then
            GOARM_SUFFIX="v${{ matrix.goarm }}"
          fi
          ARCHIVE_BASE="worng_${VERSION}_${GOOS}_${GOARCH}${GOARM_SUFFIX}"
          BIN_NAME="worng"
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME="worng.exe"
          fi

          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${BIN_NAME}" \
            ./cmd/worng

          # Package: tar.gz for Unix, zip for Windows
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip "${ARCHIVE_BASE}.zip" "${BIN_NAME}"
            rm "${BIN_NAME}"
          else
            tar czf "${ARCHIVE_BASE}.tar.gz" "${BIN_NAME}"
            rm "${BIN_NAME}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-arm{0}', matrix.goarm) || '' }}
          path: dist/*
          if-no-files-found: error

  # Build WASM playground artifact alongside binaries
  build-wasm:
    name: Build WASM playground
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build WASM
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GOOS=js GOARCH=wasm go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o playground/worng.wasm \
            ./playground

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-wasm
          path: playground/worng.wasm
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-wasm]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          merge-multiple: true
          path: dist

      - name: Generate checksums (SHA-256)
        run: |
          cd dist
          # Only checksum release archives and the wasm file, not the checksums file itself
          sha256sum worng_* worng.wasm > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/worng_*
            dist/worng.wasm
            dist/checksums.txt
